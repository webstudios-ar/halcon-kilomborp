name: Halcon Bot
on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'
jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: cd bot && npm install
      - env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: cd bot && timeout 200 node index.js || true
